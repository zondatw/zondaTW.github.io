layout: default
permalink: /html-preview/
title: Html Preview
---

<article class="dark">
  <h2>HTML Preview</h2>

  <div class="html-preview">
    <input id="previewUrl" type="url" placeholder="https://github.com/user/repo/blob/main/index.html" spellcheck="false" />
    <div class="button-group">
      <button id="previewGo" type="button" class="btn-run">Run Preview</button>
      <button id="copyUrl" type="button" class="btn-copy">Copy Sharing Link</button>
    </div>
  </div>
  <div id="previewStatus" class="html-preview-status" hidden></div>
</article>

<style>
  .html-preview { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
  .html-preview input { 
    flex: 1; padding: 12px; border: 1px solid #444; background: #1a1a1a; 
    color: #fff; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; 
  }
  
  .button-group { display: flex; gap: 10px; }
  .button-group button { 
    flex: 1; padding: 12px; border: none; border-radius: 6px; 
    cursor: pointer; font-weight: bold; transition: all 0.2s; 
  }
  
  .btn-run { background: #238636; color: white; }
  .btn-run:hover { background: #2ea043; }
  
  .btn-copy { 
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d !important; 
  }
  .btn-copy:hover { background: #30363d; }
  
  .html-preview-status { 
    padding: 12px; background: #252115; color: #e3b341; 
    border-radius: 6px; border: 1px solid #d29922; font-size: 14px; 
  }
  
  @media (max-width: 480px) {
    .button-group { flex-direction: column; }
  }
</style>

<script>
  (function () {
    const input = document.getElementById("previewUrl");
    const btnGo = document.getElementById("previewGo");
    const btnCopy = document.getElementById("copyUrl");
    const status = document.getElementById("previewStatus");

    function getSharingUrl() {
      const val = input.value.trim();
      if (!val) return null;
      const base = window.location.origin + window.location.pathname;
      return `${base}?url=${encodeURIComponent(val)}`;
    }

    btnCopy.addEventListener("click", () => {
      const shareUrl = getSharingUrl();
      if (!shareUrl) {
        alert("請先輸入網址");
        return;
      }
      
      navigator.clipboard.writeText(shareUrl).then(() => {
        const originalText = btnCopy.textContent;
        btnCopy.textContent = "✓ Copied!";
        setTimeout(() => {
          btnCopy.textContent = originalText;
        }, 2000);
      }).catch(err => {
        console.error('無法複製', err);
        alert("複製失敗，請手動複製網址列");
      });
    });


    function getCdnUrl(url) {
      const match = url.match(/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/i);
      if (match) {
        const [_, user, repo, branch, path] = match;
        return `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`;
      }
      return url;
    }

    async function preview(url) {
      if (!url) return;
      const cdnUrl = getCdnUrl(url);
      const baseUrl = cdnUrl.substring(0, cdnUrl.lastIndexOf('/') + 1);

      status.textContent = "Bypassing ORB via jsDelivr...";
      status.hidden = false;

      try {
        const response = await fetch(cdnUrl);
        if (!response.ok) throw new Error("Fetch failed");
        let content = await response.text();

        const rewritePath = (tag, attr) => {
          const reg = new RegExp('<' + tag + '([^>]+)' + attr + '=["\'](?!(?:https?|//|data:))([^"\']+)["\']', 'gi');
          content = content.replace(reg, (m, before, path) => {
            try {
              const absPath = new URL(path, baseUrl).href;
              return '<' + tag + before + attr + '="' + absPath + '"';
            } catch(e) { return m; }
          });
        };

        rewritePath('script', 'src');
        rewritePath('link', 'href');
        rewritePath('img', 'src');

        const headInjection = `
          <head>
            <base href="${baseUrl}">
            <style>
              html, body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
            </style>
        `;
        content = content.replace(/<head([^>]*)>/i, headInjection);

        document.open();
        document.write(content);
        document.close();

      } catch (e) {
        status.textContent = "Error: " + e.message;
        console.error(e);
      }
    }

    btnGo.addEventListener("click", () => {
      const url = input.value.trim();
      if (url) {
        const shareUrl = getSharingUrl();
        window.history.pushState({ path: shareUrl }, '', shareUrl);
        preview(url);
      }
    });

    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const urlParam = params.get("url");
      if (urlParam) {
        input.value = urlParam;
        preview(urlParam);
      }
    });
  })();
</script>
