<article id="main-ui" class="dark">
  <h2>HTTP Preview (Full Execution Mode)</h2>
  <p>輸入 GitHub HTML 檔案網址，程式將轉換並直接在當前視窗渲染該網頁。</p>

  <div class="http-preview">
    <label for="previewUrl">URL</label>
    <input id="previewUrl" type="url" placeholder="https://github.com/user/repo/blob/main/index.html" autocomplete="off" />
    <button id="previewGo" type="button">Run Web</button>
    <button id="previewOpen" type="button">Open in New Tab</button>
  </div>

  <div id="previewStatus" class="http-preview-status" hidden></div>

  <div class="info-box">
    <strong>💡 提示：</strong> 執行後若要回到此頁面，請點擊瀏覽器的「上一頁」。
  </div>
</article>

<style>
  .http-preview {
    display: grid;
    grid-template-columns: 60px 1fr auto auto;
    gap: 12px;
    align-items: center;
    margin: 16px 0 20px;
  }
  .http-preview input {
    padding: 10px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #1a1a1a;
    color: #f2f2f2;
    font-size: 14px;
  }
  .http-preview button {
    padding: 10px 16px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #2a2a2a;
    color: #fff;
    cursor: pointer;
  }
  #previewGo {
    background: #238636;
    border-color: #2ea043;
  }
  .http-preview-status {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 6px;
    background: #252115;
    border-left: 4px solid #d29922;
    color: #e3b341;
  }
  .info-box {
    margin-top: 20px;
    padding: 15px;
    background: #161b22;
    border-radius: 8px;
    font-size: 0.9em;
    color: #8b949e;
  }
  @media (max-width: 768px) {
    .http-preview { grid-template-columns: 1fr; }
  }
</style>

<script>
  (function () {
    const input = document.getElementById("previewUrl");
    const btnGo = document.getElementById("previewGo");
    const btnOpen = document.getElementById("previewOpen");
    const status = document.getElementById("previewStatus");

    function showStatus(msg) {
      status.textContent = msg;
      status.hidden = false;
    }

    // 將 Github 連結轉換為 Raw 連結
    function getRawUrl(url) {
      try {
        let u = new URL(url.trim());
        if (u.hostname === 'github.com') {
          return u.href
            .replace('github.com', 'raw.githubusercontent.com')
            .replace('/blob/', '/');
        }
        return u.href;
      } catch (e) { return url; }
    }

    async function startExecution() {
      let rawInput = input.value.trim();
      if (!rawInput) return;

      // 補足協定
      if (!/^https?:\/\//i.test(rawInput)) {
        rawInput = "https://" + rawInput;
      }

      const targetUrl = getRawUrl(rawInput);
      showStatus("正在讀取並編譯腳本，請稍候...");

      try {
        const response = await fetch(targetUrl);
        if (!response.ok) throw new Error("讀取失敗，請確認該 Repo 是公開的。");
        
        let htmlContent = await response.text();

        // 核心邏輯：計算基礎路徑以修復相對資源 (CSS/JS/IMG)
        const baseUrl = targetUrl.substring(0, targetUrl.lastIndexOf('/') + 1);
        
        // 建立一個乾淨的 HTML 結構，強制注入 <base>
        const finalDoc = `
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <base href="${baseUrl}">
            <script>
              // 修正一些抓取環境下的基礎 API 差異
              console.log("Environment: Preview Mode Active");
            <\/script>
          </head>
          ${htmlContent}
          </html>
        `;

        // 更新網址列紀錄，但不刷新頁面 (方便上一頁回來)
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set("url", rawInput);
        history.pushState({}, "", newUrl);

        // --- 完全執行：重寫當前 Document ---
        document.open();
        document.write(finalDoc);
        document.close();

      } catch (err) {
        showStatus("發生錯誤: " + err.message);
        console.error(err);
      }
    }

    btnGo.addEventListener("click", startExecution);
    
    btnOpen.addEventListener("click", () => {
      const url = input.value.trim();
      if (url) window.open(url, "_blank");
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") startExecution();
    });

    // 解析網址參數自動載入
    const params = new URLSearchParams(window.location.search);
    if (params.get("url")) {
      input.value = params.get("url");
      // 注意：基於安全考慮，通常需要使用者手動點擊 Run 以觸發 script 執行
    }
  })();
</script>
