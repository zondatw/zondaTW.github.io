title: Http Preview

<article id="preview-interface" class="dark">
  <h2>HTTP Preview</h2>

  <div class="http-preview">
    <label for="previewUrl">URL</label>
    <input id="previewUrl" type="url" placeholder="https://github.com/user/repo/blob/main/index.html" autocomplete="off" />
    <button id="previewGo" type="button" style="background: #238636; border-color: #2ea043;">Run Web</button>
  </div>
  <div id="previewStatus" class="http-preview-status" hidden></div>
  <hr>
  <div id="render-target"></div>
</article>

<style>
  .http-preview { display: grid; grid-template-columns: 60px 1fr auto; gap: 12px; align-items: center; margin: 16px 0; }
  .http-preview input { padding: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; border-radius: 6px; width: 100%; }
  .http-preview button { padding: 10px 20px; color: #fff; border-radius: 6px; cursor: pointer; border: 1px solid #555; background: #2a2a2a; }
  .http-preview-status { padding: 10px; background: #161b22; color: #58a6ff; border-radius: 6px; margin-bottom: 10px; font-size: 14px; border: 1px solid #30363d; }
  
  /* 預覽容器樣式，模擬一個乾淨的畫布 */
  #render-target { 
    background: #fff; 
    color: #000; 
    min-height: 500px; 
    padding: 0; 
    border-radius: 8px; 
    border: 1px solid #333; 
    overflow: auto;
    position: relative;
  }
</style>

<script>
  (function () {
    const input = document.getElementById("previewUrl");
    const btnGo = document.getElementById("previewGo");
    const status = document.getElementById("previewStatus");
    const target = document.getElementById("render-target");

    function setStatus(msg) {
      status.textContent = msg;
      status.hidden = !msg;
    }

    function getRawUrl(url) {
      try {
        let u = new URL(url.trim());
        if (u.hostname === 'github.com') {
          return u.href.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        return u.href;
      } catch (e) { return url; }
    }

    function absolutePath(base, relative) {
      if (!relative || relative.startsWith('http') || relative.startsWith('//') || relative.startsWith('data:')) return relative;
      const stack = base.split('/');
      stack.pop(); 
      const parts = relative.split('/');
      for (let i = 0; i < parts.length; i++) {
        if (parts[i] === '.') continue;
        if (parts[i] === '..') stack.pop();
        else stack.push(parts[i]);
      }
      return stack.join('/');
    }

    async function executePreview() {
      let url = input.value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;

      const rawUrl = getRawUrl(url);
      const baseUrl = rawUrl.substring(0, rawUrl.lastIndexOf('/') + 1);
      
      setStatus("正在進行深度渲染 (CSS & JS)...");
      target.innerHTML = ''; // 清空舊內容

      try {
        const res = await fetch(rawUrl);
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // 1. 處理 CSS (手動抓取內容以避開 MIME 檢查)
        const links = doc.querySelectorAll('link[rel="stylesheet"]');
        for (let link of links) {
          const cssUrl = absolutePath(rawUrl, link.getAttribute('href'));
          try {
            const cssRes = await fetch(cssUrl);
            let cssText = await cssRes.text();
            
            // 修正 CSS 內部的 url() 路徑 (如背景圖)
            const cssBase = cssUrl.substring(0, cssUrl.lastIndexOf('/') + 1);
            cssText = cssText.replace(/url\(['"]?([^'")]*)['"]?\)/g, (match, p1) => {
              return `url("${absolutePath(cssUrl, p1)}")`;
            });

            const styleTag = document.createElement('style');
            styleTag.innerHTML = cssText;
            target.appendChild(styleTag);
          } catch (e) { console.warn("CSS 載入失敗:", cssUrl); }
        }

        // 2. 修正圖片與資源路徑
        doc.querySelectorAll('img, source, video').forEach(el => {
          const attr = el.tagName === 'IMG' ? 'src' : 'src';
          if (el.hasAttribute(attr)) {
            el.setAttribute(attr, absolutePath(rawUrl, el.getAttribute(attr)));
          }
        });

        // 3. 注入 HTML
        const contentWrapper = document.createElement('div');
        contentWrapper.innerHTML = doc.body.innerHTML;
        target.appendChild(contentWrapper);

        // 4. 處理 JS
        const scripts = doc.querySelectorAll('script');
        for (let oldScript of scripts) {
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          
          if (oldScript.src) {
            newScript.src = absolutePath(rawUrl, oldScript.getAttribute('src'));
          } else {
            newScript.innerHTML = oldScript.innerHTML;
          }
          document.body.appendChild(newScript);
        }

        setStatus("渲染完成！");
      } catch (err) {
        setStatus("錯誤: " + err.message);
      }
    }

    btnGo.addEventListener("click", executePreview);
    const params = new URLSearchParams(window.location.search);
    if (params.get("url")) { input.value = params.get("url"); }
  })();
</script>
