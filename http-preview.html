title: Http Preview

<div id="ui-layer">
  <article class="dark">
    <h2>HTTP Preview</h2>

    <div class="http-preview">
      <input id="previewUrl" type="url" placeholder="https://github.com/user/repo/blob/main/index.html" spellcheck="false" />
      <button id="previewGo" type="button">Run Preview</button>
    </div>
    <div id="previewStatus" class="http-preview-status" hidden></div>
  </article>
</div>

<style>
  .http-preview { display: flex; gap: 10px; margin: 20px 0; }
  .http-preview input { flex: 1; padding: 12px; border: 1px solid #444; background: #1a1a1a; color: #fff; border-radius: 6px; }
  .http-preview button { padding: 10px 24px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  .http-preview-status { padding: 12px; background: #252115; color: #e3b341; border-radius: 6px; border: 1px solid #d29922; }
</style>

<script>
  (function () {
    const input = document.getElementById("previewUrl");
    const btnGo = document.getElementById("previewGo");
    const status = document.getElementById("previewStatus");

    // using jsDeliver to bypassing ORB
    function getCdnUrl(url) {
      const match = url.match(/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/i);
      if (match) {
        const [_, user, repo, branch, path] = match;
        return `https://cdn.jsdelivr.net/gh/${user}/${repo}@${branch}/${path}`;
      }
      return url;
    }

    async function preview(url) {
      if (!url) return;
      const cdnUrl = getCdnUrl(url);
      const baseUrl = cdnUrl.substring(0, cdnUrl.lastIndexOf('/') + 1);

      status.textContent = "Bypassing ORB via jsDelivr...";
      status.hidden = false;

      try {
        const response = await fetch(cdnUrl);
        if (!response.ok) throw new Error("Fetch failed");
        let content = await response.text();

        // 1. replace path to jsDelivr's path
        const rewritePath = (tag, attr) => {
          const reg = new RegExp('<' + tag + '([^>]+)' + attr + '=["\'](?!(?:https?|//|data:))([^"\']+)["\']', 'gi');
          content = content.replace(reg, (m, before, path) => {
            const absPath = new URL(path, baseUrl).href;
            return '<' + tag + before + attr + '="' + absPath + '"';
          });
        };

        rewritePath('script', 'src');
        rewritePath('link', 'href');
        rewritePath('img', 'src');

        // 2. inject Base
        content = content.replace(/<head([^>]*)>/i, '<head$1><base href="' + baseUrl + '">');

        // 3. rewrite
        document.open();
        document.write(content);
        document.close();

      } catch (e) {
        status.textContent = "Error: " + e.message;
        console.error(e);
      }
    }

    btnGo.addEventListener("click", () => {
      const url = input.value.trim();
      if (url) {
        const newUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(url);
        window.history.pushState({ path: newUrl }, '', newUrl);
        preview(url);
      }
    });

    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const urlParam = params.get("url");
      if (urlParam) {
        input.value = urlParam;
        preview(urlParam);
      }
    });
  })();
</script>
